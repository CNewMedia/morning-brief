name: Morning Brief

on:
  schedule:
    - cron: "0 7 * * 1-5"
  workflow_dispatch:
  repository_dispatch:
    types: [calendar-update]

jobs:
  morning-brief:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic requests google-auth google-auth-oauthlib google-auth-httplib2 google-api-python-client python-dotenv

      - name: Run Morning Brief
        env:
          CLICKUP_API_KEY: ${{ secrets.CLICKUP_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLICKUP_TEAM_ID: ${{ secrets.CLICKUP_TEAM_ID }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GOOGLE_TOKEN_B64: ${{ secrets.GOOGLE_TOKEN_B64 }}
        run: python morning_brief.py
